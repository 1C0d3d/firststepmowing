<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Shutdown</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a23, #02021c);
            font-family: 'Courier New', monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: floatIn 2s ease-out;
        }

        .message {
            position: absolute;
            animation: glow 2s infinite;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            animation-delay: 0.3s;
        }

        .date {
            position: absolute;
            animation: glow 2s infinite;
            font-size: 1em;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            animation-delay: 0.5s;
        }

        @keyframes floatIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes glow {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 1; filter: blur(0); }
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message">Closing Buisness</div>
        <div class="date">Site Shutdown 4/22/2026</div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>
</body>
</html>
